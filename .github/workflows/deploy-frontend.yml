name: Deploy Frontend (S3)

on:
  push:
    branches: [main]
    paths:
      - "fe-react/**"
      - ".github/workflows/deploy-frontend.yml"

env:
  AWS_REGION: eu-north-1
  PROJECT_NAME: learn-aws
  ENVIRONMENT: dev
  BUCKET: learn-aws-dev-frontend

jobs:
  deploy:
    name: Build & Deploy to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fe-react/package-lock.json

      - name: Install dependencies
        working-directory: fe-react
        run: npm ci

      - name: Build
        working-directory: fe-react
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_API_ENDPOINT: ${{ secrets.VITE_API_ENDPOINT }}
          VITE_ALB_ENDPOINT: ${{ secrets.VITE_ALB_ENDPOINT }}
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync fe-react/dist/ s3://${{ env.BUCKET }} --delete
          echo "Website URL: http://${{ env.BUCKET }}.s3-website.${{ env.AWS_REGION }}.amazonaws.com"
